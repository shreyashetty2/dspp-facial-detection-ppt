<style>
    :root {
        --primary: #6c5ce7;
        --bg: #f8f9fa;
        --text: #2d3436;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        margin: 0;
    }

    header {
        text-align: center;
        margin-bottom: 50px;
        max-width: 800px;
    }

    h1 { margin-bottom: 10px; color: var(--primary); }
    h2 { font-weight: 400; opacity: 0.8; font-size: 1.2rem; }

    .grid {
        display: grid;
        /* Updated this line to control max box width */
        grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
        gap: 25px;
        width: 100%;
        max-width: 1000px;
        /* Added this to center the boxes */
        justify-content: center;
    }

    .tile {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-decoration: none;
        color: inherit;
        text-align: center;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        transition: all 0.3s ease;
        border: 2px solid transparent;
        display: flex;
        flex-direction: column;
        align-items: center; /* Centers content inside the tile */
        justify-content: center;
        min-height: 150px;
    }

    .tile:hover {
        transform: translateY(-10px);
        border-color: var(--primary);
        box-shadow: 0 15px 30px rgba(108, 92, 231, 0.2);
    }

    .tile-title {
        font-weight: bold;
        font-size: 1.1rem;
    }
</style>
