<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Brittleness Simulator - Detailed</title>
    <style>
        /* Modern, Clean Light Theme */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff; 
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .container {
            background: #f8fafc;
            padding: 25px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 1000px; /* Widened slightly */
            max-width: 100%;
            border: 1px solid #e2e8f0;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-size: 28px; /* Scaled down */
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 20px;
        }

        /* Dashboard */
        .dashboard-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: #ffffff;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .card label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
        }

        .value {
            font-size: 22px; /* Scaled down */
            font-weight: 800;
            color: #0f172a;
        }

        .rate-value {
            font-size: 28px; /* Scaled down */
            color: #ec4899; 
        }

        select, input[type=range] {
            width: 100%;
            padding: 6px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: #f1f5f9;
            font-weight: 600;
            cursor: pointer;
        }

        input[type=range] {
            accent-color: #a855f7;
            margin-top: 8px;
        }

        /* Status Colors */
        .status-stable { color: #10b981; }
        .status-brittle { color: #f59e0b; }
        .status-blind { color: #ef4444; }

        /* Icon Grid */
        .grid-container {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px; /* Reduced gap for zoomed out look */
            justify-items: center;
        }

        /* Individual Face Card */
        .face-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.4s ease;
        }

        .face-svg {
            width: 30px; /* Scaled down from 36px */
            height: 30px;
            transition: all 0.4s ease;
        }

        /* DETECTED STATE */
        .detected .face-svg {
            fill: url(#cuteGlow);
            filter: drop-shadow(0 0 6px rgba(236, 72, 153, 0.5));
            transform: scale(1.05);
        }
        
        .detected .score-text {
            color: #a855f7;
            font-weight: 800;
        }

        /* UNDETECTED STATE */
        .undetected .face-svg {
            fill: #e2e8f0; 
            opacity: 0.4;
            transform: scale(0.9);
            filter: none;
        }

        .undetected .score-text {
            color: #cbd5e1;
            opacity: 0.5;
        }

        .cross-overlay {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .undetected .cross-overlay {
            opacity: 1; 
        }

        .score-text {
            font-size: 10px;
            margin-top: 2px;
            font-weight: 600;
            transition: all 0.4s ease;
        }

    </style>
</head>
<body>

<svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <linearGradient id="cuteGlow" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ec4899" />
        <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
</svg>

<div class="container">
    <h1>Algorithm Brittleness: Individual Analysis</h1>
    
    <div class="dashboard-row">
        <div class="card">
            <label>Environment Context</label>
            <select id="envSelect">
                <option value="easy">Easy (Classroom)</option>
                <option value="hard">Hard (Chaotic Crowd)</option>
            </select>
        </div>

        <div class="card">
            <label>Confidence Threshold</label>
            <input type="range" id="thresholdSlider" min="50" max="90" value="50" step="1">
            <div id="thresholdVal" class="value" style="font-size: 16px; margin-top: 5px; color: #a855f7;">50% Required</div>
        </div>

        <div class="card" style="border-color: #fbcfe8; background-color: #fdf2f8;">
            <label style="color: #ec4899;">Overall Average</label>
            <div id="rateVal" class="value rate-value">100%</div>
        </div>

        <div class="card">
            <label>System Status</label>
            <div id="statusVal" class="value status-stable">Stable</div>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid" id="faceGrid">
            </div>
    </div>
</div>

<script>
    const facePaths = [
        `<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 13c-1.66 0-3-1.34-3-3h2c0 .55.45 1 1 1s1-.45 1-1h2c0 1.66-1.34 3-3 3zm-2-5c-.83 0-1.5-.67-1.5-1.5S7.17 7 8 7s1.5.67 1.5 1.5S8.83 10 8 10zm8 0c-.83 0-1.5-.67-1.5-1.5S15.17 7 16 7s1.5.67 1.5 1.5S16.83 10 16 10z"/>`,
        `<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 13c-1.66 0-3-1.34-3-3h2c0 .55.45 1 1 1s1-.45 1-1h2c0 1.66-1.34 3-3 3zm1-7H8V6h3v2zm6 0c-.83 0-1.5-.67-1.5-1.5S16.17 5 17 5s1.5.67 1.5 1.5S17.83 8 17 8z"/>`,
        `<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 13c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2zm-3-5c-.83 0-1.5-.67-1.5-1.5S8.17 7 9 7s1.5.67 1.5 1.5S9.83 10 9 10zm6 0c-.83 0-1.5-.67-1.5-1.5S14.17 7 15 7s1.5.67 1.5 1.5S15.83 10 15 10z"/>`,
        `<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm-3.5-7c-.83 0-1.5-.67-1.5-1.5S7.67 6 8.5 6s1.5.67 1.5 1.5S9.33 9 8.5 9zm7 0c-.83 0-1.5-.67-1.5-1.5S14.67 6 15.5 6s1.5.67 1.5 1.5S16.33 9 15.5 9z"/>`
    ];

    const crossSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

    const totalPeople = 100;
    const peopleData = [];
    const faceElements = [];

    const grid = document.getElementById('faceGrid');
    const slider = document.getElementById('thresholdSlider');
    const envSelect = document.getElementById('envSelect');
    const thresholdVal = document.getElementById('thresholdVal');
    const rateVal = document.getElementById('rateVal');
    const statusVal = document.getElementById('statusVal');

    // Generate accurate data distribution
    for (let i = 0; i < totalPeople; i++) {
        const faceType = Math.floor(Math.random() * facePaths.length);
        
        // Easy: 90% score 90-100, 10% score 70-89
        let easyScore;
        if (Math.random() < 0.10) {
            easyScore = Math.floor(Math.random() * 20) + 70;
        } else {
            easyScore = Math.floor(Math.random() * 11) + 90;
        }
        
        // Hard: 5% fail immediately (<50). 35% fall in 50-89. 60% score 90+. 
        // This guarantees ~95% start success at threshold 50, but a massive crash later.
        let r = Math.random();
        let hardScore;
        if (r < 0.05) {
            hardScore = Math.floor(Math.random() * 20) + 30; // 30-49
        } else if (r < 0.15) {
            hardScore = Math.floor(Math.random() * 20) + 50; // 50-69
        } else if (r < 0.40) {
            hardScore = Math.floor(Math.random() * 20) + 70; // 70-89
        } else {
            hardScore = Math.floor(Math.random() * 11) + 90; // 90-100
        }

        peopleData.push({
            faceType: faceType,
            easyScore: easyScore,
            hardScore: hardScore
        });
    }

    // Shuffle the array visually
    for (let i = peopleData.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [peopleData[i], peopleData[j]] = [peopleData[j], peopleData[i]];
    }

    // Build DOM
    peopleData.forEach((person) => {
        const card = document.createElement('div');
        card.className = 'face-card detected'; 

        const svgContainer = `<svg class="face-svg" viewBox="0 0 24 24">${facePaths[person.faceType]}</svg>`;
        const crossContainer = `<div class="cross-overlay">${crossSvg}</div>`;
        const scoreDiv = `<div class="score-text">0%</div>`;

        card.innerHTML = svgContainer + crossContainer + scoreDiv;
        grid.appendChild(card);
        
        faceElements.push({
            dom: card,
            data: person,
            scoreText: card.querySelector('.score-text')
        });
    });

    // Update Logic
    function updateSimulation() {
        const threshold = parseInt(slider.value);
        const env = envSelect.value;
        thresholdVal.innerText = threshold + '% Required';

        let successCount = 0;

        faceElements.forEach(item => {
            const currentScore = env === 'easy' ? item.data.easyScore : item.data.hardScore;
            item.scoreText.innerText = currentScore + '%';

            if (currentScore >= threshold) {
                item.dom.className = 'face-card detected';
                successCount++;
            } else {
                item.dom.className = 'face-card undetected';
            }
        });

        rateVal.innerText = successCount + '%';

        if (successCount >= 90) {
            statusVal.innerText = "Highly Stable";
            statusVal.className = "value status-stable";
        } else if (successCount >= 70) {
            statusVal.innerText = "Brittle / Biased";
            statusVal.className = "value status-brittle";
        } else {
            statusVal.innerText = "System Failure";
            statusVal.className = "value status-blind";
        }
    }

    slider.addEventListener('input', updateSimulation);
    envSelect.addEventListener('change', updateSimulation);

    updateSimulation();
</script>
</body>
</html>
